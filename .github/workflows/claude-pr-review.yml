name: Claude PR Review
run-name: Claude reviews PR #${{ github.event.pull_request.number }}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    name: Review with Claude Code
    runs-on: ubuntu-latest
    # Permissions Claude needs to read the diff and post review comments.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Claude can diff against the base branch

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        # Give the gh CLI a token so Claude's `gh pr comment` calls authenticate.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Temporary: print Claude's full output so the real error is visible.
          show_full_output: true
          # Use the workflow's built-in token instead of the Claude GitHub App,
          # so the App install / OIDC token exchange is not required.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Repo: ${{ github.repository }}
            PR number: ${{ github.event.pull_request.number }}

            1. Get the diff:  gh pr diff ${{ github.event.pull_request.number }}
            2. Review it for correctness bugs, security issues, and violations of
               the project conventions in CLAUDE.md (selectors live in Page Objects,
               unique @ID tags, no test.only, masked emails).
            3. You MUST post your review back to the PR with the gh CLI, e.g.:
                 gh pr comment ${{ github.event.pull_request.number }} --body "<your markdown review>"
               If there are no issues, still post a short comment saying the review
               passed. Do not finish without posting a comment.
          # Allow the GitHub CLI so the review can read the diff and post comments.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
