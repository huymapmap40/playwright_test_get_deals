name: Trigger Test
run-name: Run test playwright - getdeals247

on:
  workflow_dispatch

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  MONGODB_NAME: ${{vars.MONGODB_NAME}}
  MONGODB_URI: ${{vars.MONGODB_URI}}

jobs:
  run-tests:
    name: Run test cases
    runs-on: ubuntu-latest
    container:
      image: huyquocnguyen532/playwright-get-deals:1.0.4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Execute test
        run: npx playwright test tests/sum.spec.ts
      - name: Upload report data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-data
          path: |
            playwright-report
            test-results
  report-test-result:
      name: Publish report & notify Slack
      needs: run-tests
      if: always()
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

  notify-slack:
    name: Notify Slack Channel
    # Depend on run-tests too so we can read its result for the message.
    needs: [run-tests, report-test-result]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Send message slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEFAULT_CHANNEL: automation-test-getdeals247
          TEST_RESULT: ${{ needs.run-tests.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: npx tsx scripts/notify-slack.ts



