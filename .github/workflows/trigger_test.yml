name: Trigger Test
run-name: Run test playwright - get-deals

on:
  workflow_dispatch

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  MONGODB_NAME: ${{vars.MONGODB_NAME}}
  MONGODB_URI: ${{vars.MONGODB_URI}}

jobs:
  run-tests:
    name: Run test cases
    runs-on: ubuntu-latest
    # Expose the parsed pass/fail/total counts so downstream jobs (Slack notify)
    # can read them via needs.run-tests.outputs.*
    outputs:
      passed: ${{ steps.stats.outputs.passed }}
      failed: ${{ steps.stats.outputs.failed }}
      total: ${{ steps.stats.outputs.total }}
    container:
      image: huyquocnguyen532/playwright-get-deals:1.0.4
      env:
        PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # The image baked node_modules at /node_modules (its WORKDIR is /); reuse
      # them for the checked-out code so `npx playwright test` resolves
      # @playwright/test and actually runs (otherwise no report is produced).
      # Browsers come from PLAYWRIGHT_BROWSERS_PATH (=/ms-playwright in the image).
      - name: Link prebuilt dependencies
        run: ln -s /node_modules "$GITHUB_WORKSPACE/node_modules"
      - name: Execute test
        env:
          # JSON reporter writes machine-readable stats next to the HTML report.
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json
        run: npx playwright test tests/sum.spec.ts --reporter=html,json
      - name: Read test stats
        id: stats
        if: always()
        run: |
          if [ ! -f results.json ]; then
            echo "results.json not found; defaulting stats to 0"
            echo "passed=0" >> "$GITHUB_OUTPUT"
            echo "failed=0" >> "$GITHUB_OUTPUT"
            echo "total=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PASSED=$(node -p "require('./results.json').stats.expected")
          FAILED=$(node -p "require('./results.json').stats.unexpected")
          TOTAL=$(node -p "const s=require('./results.json').stats; s.expected+s.unexpected+s.flaky+s.skipped")
          echo "Parsed stats -> passed=$PASSED failed=$FAILED total=$TOTAL"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
      - name: Upload report data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-data
          # Fail loudly if the report wasn't generated, instead of silently
          # uploading nothing and publishing an empty Pages site.
          if-no-files-found: error
          path: |
            playwright-report
  report-test-result:
      name: Publish report & notify Slack
      needs: run-tests
      if: always()
      runs-on: ubuntu-latest
      # Promote the deploy step's page_url to a job output so notify-slack can
      # read it via needs.report-test-result.outputs.page_url
      outputs:
        page_url: ${{ steps.deployment.outputs.page_url }}
      # Required by actions/deploy-pages: Pages write + OIDC token.
      permissions:
        pages: write
        id-token: write
        contents: read

      environment:
        name: github-pages
        url: ${{steps.deployment.outputs.page_url}}
      steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Download artifact
          uses: actions/download-artifact@v4
          with:
            name: report-data
            path: playwright-report

        - name: Setup Pages
          uses: actions/configure-pages@v5
          with:
            enablement: true   # auto-enable Pages (build type = GitHub Actions) on first run

        - name: Upload Pages artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: playwright-report

        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4

  notify-slack:
    name: Notify Slack Channel
    # Depend on run-tests too so we can read its result for the message.
    needs: [run-tests, report-test-result]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Send message slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEFAULT_CHANNEL: automation-test-get-deals
          TEST_RESULT: ${{ needs.run-tests.result }}
          STATUS_TEST: ${{ needs.run-tests.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_ID: ${{ github.run_id }}
          AUTHOR: ${{github.actor}}
          PASSED: ${{ needs.run-tests.outputs.passed }}
          FAILED: ${{ needs.run-tests.outputs.failed }}
          TOTAL: ${{ needs.run-tests.outputs.total }}
          REPORT_PAGE_URL: ${{needs.report-test-result.outputs.page_url}}
          BUILD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "Test result: $TEST_RESULT"
          npx tsx scripts/notify-slack.ts



